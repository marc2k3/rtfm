	]},
	{ "Guides" = [
		{ "Fonts" = "guides/fonts.md" },
		{ "Styling Ranges Of Text" = "guides/styling-ranges-text.md" },
		{ "$font & $rgb" = "guides/font-rgb.md" },
		{ "Country Flags" = "guides/country-flags.md" },
		{ "Gradients" = "guides/gradients.md" },
		{ "Web Requests" = "guides/web-requests.md" },
	]},
	{ "Gallery" = [
		{ "Gallery" = [
			"gallery/index.md"
		]},
		{ "Album Art" = "gallery/album-art.md" },
		{ "Images" = "gallery/images.md" },
		{ "JS Playlist" = "gallery/jsplaylist.md" },
		{ "Last.fm Bio" = "gallery/lastfm-bio.md" },
		{ "Last.fm Info" = "gallery/lastfm-info.md" },
		{ "MusicBrainz" = "gallery/musicbrainz.md" },
		{ "Properties + Other Info" = "gallery/properties-other-info.md" },
		{ "Seekbars + Buttons" = "gallery/seekbar-button.md" },
		{ "Smooth Browser" = "gallery/smooth-browser.md" },
		{ "Smooth Playlist" = "gallery/smooth-playlist.md" },
		{ "Smooth Playlist Manager" = "gallery/smooth-playlist-manager.md" },
		{ "Text Display" = "gallery/text-display.md" },
		{ "Text Reader" = "gallery/text-reader.md" },
		{ "Thumbs" = "gallery/thumbs.md" },
		{ "VU Meter" = "gallery/vu-meter.md" },
	]}
]

[project.theme]
palette.accent = "indigo"
palette.primary = "indigo"
features = [
	"content.code.copy",
	"navigation.indexes",
	"navigation.sections",
	"navigation.tabs",
	"navigation.tabs.sticky",
	"navigation.top"
]

[project.theme.icon]
logo = "material/language-javascript"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/marc2k3"

[project.markdown_extensions.admonition]

[project.markdown_extensions.pymdownx.highlight]

[project.markdown_extensions.pymdownx.keys]

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.toc]
permalink = "#"
